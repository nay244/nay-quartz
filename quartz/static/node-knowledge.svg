  <line x1="24" y1="64" x2="90" y2="64" stroke="#EDE5CB" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="24" y1="74" x2="95" y2="74" stroke="#EDE5CB" stroke-width="1" stroke-opacity="0.35"/>
