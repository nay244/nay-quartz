<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none">
  <!-- axes -->
  <line x1="20" y1="10" x2="20" y2="82" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="20" y1="82" x2="152" y2="82" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- ascending chart line -->
  <polyline points="28,72 55,58 82,44 108,28 138,14" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.75" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- waypoint circles -->
  <circle cx="28" cy="72" r="3.5" fill="#EDE5CB" fill-opacity="0.5"/>
  <circle cx="55" cy="58" r="3.5" fill="#EDE5CB" fill-opacity="0.5"/>
  <circle cx="82" cy="44" r="3.5" fill="#EDE5CB" fill-opacity="0.5"/>
  <circle cx="108" cy="28" r="3.5" fill="#EDE5CB" fill-opacity="0.5"/>
  <!-- top waypoint in terra -->
  <circle cx="138" cy="14" r="5" fill="#E89265" opacity="0.85"/>
  <!-- grid lines (subtle) -->
  <line x1="20" y1="60" x2="150" y2="60" stroke="#EDE5CB" stroke-width="0.75" stroke-opacity="0.15" stroke-dasharray="4,4"/>
  <line x1="20" y1="40" x2="150" y2="40" stroke="#EDE5CB" stroke-width="0.75" stroke-opacity="0.15" stroke-dasharray="4,4"/>
  <line x1="20" y1="20" x2="150" y2="20" stroke="#EDE5CB" stroke-width="0.75" stroke-opacity="0.15" stroke-dasharray="4,4"/>
  <!-- arrow up on Y axis -->
  <polyline points="16,14 20,8 24,14" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5" stroke-linejoin="round"/>
</svg>
