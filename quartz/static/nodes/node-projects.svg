<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none">
  <!-- circuit board lines -->
  <line x1="30" y1="50" x2="65" y2="50" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="65" y1="50" x2="65" y2="25" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="65" y1="25" x2="100" y2="25" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="65" y1="50" x2="100" y2="50" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="65" y1="50" x2="65" y2="75" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="65" y1="75" x2="100" y2="75" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="100" y1="25" x2="130" y2="14" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="100" y1="50" x2="130" y2="50" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="100" y1="75" x2="130" y2="86" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- outer nodes -->
  <circle cx="30" cy="50" r="5" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.6" fill="none"/>
  <circle cx="100" cy="25" r="5" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.6" fill="none"/>
  <circle cx="100" cy="75" r="5" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.6" fill="none"/>
  <circle cx="130" cy="14" r="4" fill="#EDE5CB" fill-opacity="0.4"/>
  <circle cx="130" cy="50" r="4" fill="#EDE5CB" fill-opacity="0.4"/>
  <circle cx="130" cy="86" r="4" fill="#EDE5CB" fill-opacity="0.4"/>
  <!-- central hub node in terra -->
  <circle cx="65" cy="50" r="7" fill="#E89265" opacity="0.8"/>
