<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none">
  <!-- terminal window frame -->
  <rect x="8" y="8" width="144" height="84" rx="2" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- title bar -->
  <line x1="8" y1="24" x2="152" y2="24" stroke="#EDE5CB" stroke-width="1" stroke-opacity="0.35"/>
  <!-- window control dots -->
  <circle cx="19" cy="16" r="2.5" fill="#EDE5CB" fill-opacity="0.4"/>
  <circle cx="28" cy="16" r="2.5" fill="#EDE5CB" fill-opacity="0.4"/>
  <circle cx="37" cy="16" r="2.5" fill="#EDE5CB" fill-opacity="0.4"/>
  <!-- profile silhouette: head -->
  <circle cx="80" cy="55" r="15" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.75"/>
  <!-- profile silhouette: shoulders -->
  <path d="M48 92 Q80 72 112 92" stroke="#EDE5CB" stroke-width="1.5" stroke-opacity="0.75"/>
  <!-- terra cursor block -->
  <rect x="130" y="74" width="7" height="12" fill="#E89265" opacity="0.85"/>
  <!-- prompt line -->
  <line x1="16" y1="80" x2="122" y2="80" stroke="#E89265" stroke-width="1" stroke-opacity="0.35"/>
</svg>
