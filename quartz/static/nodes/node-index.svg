<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" fill="none">
  <!-- outer ring nodes + connection lines to center -->
  <line x1="80" y1="50" x2="80" y2="12" stroke="#EDE5CB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="80" y1="50" x2="140" y2="26" stroke="#EDE5CB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="80" y1="50" x2="148" y2="70" stroke="#EDE5CB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="80" y1="50" x2="112" y2="90" stroke="#EDE5CB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="80" y1="50" x2="48" y2="90" stroke="#EDE5CB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="80" y1="50" x2="12" y2="70" stroke="#EDE5CB" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="80" y1="50" x2="20" y2="26" stroke="#EDE5CB" stroke-width="1" stroke-opacity="0.4"/>
  <!-- cross-connections -->
  <line x1="80" y1="12" x2="140" y2="26" stroke="#EDE5CB" stroke-width="0.75" stroke-opacity="0.2"/>
  <line x1="140" y1="26" x2="148" y2="70" stroke="#EDE5CB" stroke-width="0.75" stroke-opacity="0.2"/>
  <line x1="20" y1="26" x2="12" y2="70" stroke="#EDE5CB" stroke-width="0.75" stroke-opacity="0.2"/>
  <line x1="48" y1="90" x2="112" y2="90" stroke="#EDE5CB" stroke-width="0.75" stroke-opacity="0.2"/>
  <!-- outer nodes -->
  <circle cx="80" cy="12" r="4" fill="#EDE5CB" fill-opacity="0.45"/>
  <circle cx="140" cy="26" r="4" fill="#EDE5CB" fill-opacity="0.45"/>
  <circle cx="148" cy="70" r="4" fill="#EDE5CB" fill-opacity="0.45"/>
  <circle cx="112" cy="90" r="4" fill="#EDE5CB" fill-opacity="0.45"/>
  <circle cx="48" cy="90" r="4" fill="#EDE5CB" fill-opacity="0.45"/>
  <circle cx="12" cy="70" r="4" fill="#EDE5CB" fill-opacity="0.45"/>
  <circle cx="20" cy="26" r="4" fill="#EDE5CB" fill-opacity="0.45"/>
  <!-- central glowing node -->
  <circle cx="80" cy="50" r="10" fill="#E89265" opacity="0.85"/>
  <circle cx="80" cy="50" r="15" stroke="#E89265" stroke-width="1" stroke-opacity="0.3" fill="none"/>
</svg>
